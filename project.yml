name: AgentMesh
options:
  bundleIdPrefix: com.agentmesh
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: AgentMesh
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  AgentMesh:
    type: application
    platform: macOS
    sources:
      - path: AgentMesh/Sources
      - path: AgentMesh/Resources
    settings:
      base:
        INFOPLIST_FILE: AgentMesh/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentmesh.app
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: AgentMesh/Resources/AgentMesh.entitlements
